---
# ServiceAccount for the User Service
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-service-sa
  namespace: app
  labels:
    app: user-service
---
# ServiceAccount for the Product Service
apiVersion: v1
kind: ServiceAccount
metadata:
  name: product-service-sa
  namespace: app
  labels:
    app: product-service
---
# Role: allows reading ConfigMaps and Secrets in the 'app' namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-service-role
  namespace: app
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
# Bind the role to the user-service ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: user-service-rolebinding
  namespace: app
subjects:
  - kind: ServiceAccount
    name: user-service-sa
    namespace: app
roleRef:
  kind: Role
  name: app-service-role
  apiGroup: rbac.authorization.k8s.io
---
# Bind the role to the product-service ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: product-service-rolebinding
  namespace: app
subjects:
  - kind: ServiceAccount
    name: product-service-sa
    namespace: app
roleRef:
  kind: Role
  name: app-service-role
  apiGroup: rbac.authorization.k8s.io
