# kind cluster config for local testing
# Uses 1 control-plane + 2 workers to simulate bare metal
# Port mappings let the NGINX Ingress work on localhost:80 and localhost:443

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k8s-practice

nodes:
  - role: control-plane
    # Map host port 80/443 into the control-plane node for Ingress
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"

  - role: worker
    # Label this as worker-node-1 (matches our PersistentVolume nodeAffinity)
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "role=worker"

  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "role=worker"
