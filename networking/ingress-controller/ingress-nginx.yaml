# NGINX Ingress Controller for bare-metal
# Source: https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.9.6/deploy/static/provider/baremetal/deploy.yaml
#
# To install (recommended — always use official pinned manifest):
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.9.6/deploy/static/provider/baremetal/deploy.yaml
#
# For MetalLB integration, patch the service type to LoadBalancer:
#   kubectl patch svc ingress-nginx-controller \
#     -n ingress-nginx \
#     -p '{"spec":{"type":"LoadBalancer"}}'
#
# Verify it gets an EXTERNAL-IP from MetalLB:
#   kubectl get svc ingress-nginx-controller -n ingress-nginx
#
# See docs/networking.md for the full setup guide including TLS with cert-manager.
#
# The controller watches Ingress resources in all namespaces.
# Our Ingress rules are defined in ../ingress/app-ingress.yaml

# ─────────────────────────────────────────────────────────────────────────────
# CUSTOM CONFIGMAP — tune NGINX behavior
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/name: ingress-nginx
data:
  # Enable real IP pass-through
  use-forwarded-headers: "true"
  compute-full-forwarded-for: "true"
  # Enable access logs in JSON for ELK parsing
  log-format-upstream: >-
    {"time": "$time_iso8601", "addr": "$remote_addr", "host": "$host",
     "method": "$request_method", "uri": "$request_uri", "status": $status,
     "bytes": $body_bytes_sent, "duration": $request_time,
     "upstream": "$upstream_addr"}
  # Proxy timeouts
  proxy-connect-timeout: "10"
  proxy-read-timeout: "60"
  proxy-send-timeout: "60"
  # Enable gzip
  use-gzip: "true"
  gzip-level: "5"
