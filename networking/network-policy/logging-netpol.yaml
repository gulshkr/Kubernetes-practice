---
# NetworkPolicy for the 'logging' namespace
# Elasticsearch: only accessible from Logstash and Kibana
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-logstash-kibana-to-elasticsearch
  namespace: logging
spec:
  podSelector:
    matchLabels:
      app: elasticsearch
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: logstash
        - podSelector:
            matchLabels:
              app: kibana
      ports:
        - protocol: TCP
          port: 9200
        - protocol: TCP
          port: 9300
---
# Logstash: only receives beats from Filebeat pods (also in logging namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-filebeat-to-logstash
  namespace: logging
spec:
  podSelector:
    matchLabels:
      app: logstash
  policyTypes:
    - Ingress
  ingress:
    # From Filebeat DaemonSet pods in logging namespace
    - from:
        - podSelector:
            matchLabels:
              app: filebeat
      ports:
        - protocol: TCP
          port: 5044
    # From app namespace pods (direct beats input if needed)
    - from:
        - namespaceSelector:
            matchLabels:
              name: app
      ports:
        - protocol: TCP
          port: 5044
---
# Kibana: accessible only from Ingress Controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-kibana
  namespace: logging
spec:
  podSelector:
    matchLabels:
      app: kibana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5601
