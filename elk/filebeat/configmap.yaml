---
apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: logging
  labels:
    app: filebeat
data:
  filebeat.yml: |
    filebeat.autodiscover:
      providers:
        - type: kubernetes
          # Discover all pods on the current node
          node: ${NODE_NAME}
          hints.enabled: true
          hints.default_config:
            type: container
            paths:
              - /var/log/containers/*${data.kubernetes.container.id}.log
          templates:
            # Template for our app namespace pods
            - condition:
                equals:
                  kubernetes.namespace: app
              config:
                - type: container
                  paths:
                    - /var/log/containers/*${data.kubernetes.container.id}.log
                  json.keys_under_root: true
                  json.ignore_decoding_error: true

    # Enrich events with Kubernetes metadata (labels, namespace, pod, node)
    processors:
      - add_kubernetes_metadata:
          host: ${NODE_NAME}
          matchers:
            - logs_path:
                logs_path: /var/log/containers/

    # Send to Logstash
    output.logstash:
      hosts: ["logstash.logging.svc.cluster.local:5044"]
      # Retry on failure
      worker: 2
      bulk_max_size: 2048

    # Logging config for Filebeat itself
    logging.level: info
    logging.to_files: false
