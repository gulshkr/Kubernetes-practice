---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: logging
  labels:
    app: filebeat
spec:
  selector:
    matchLabels:
      app: filebeat
  template:
    metadata:
      labels:
        app: filebeat
    spec:
      serviceAccountName: filebeat
      # Run on every node including control-plane (for log collection)
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      terminationGracePeriodSeconds: 30
      containers:
        - name: filebeat
          image: docker.elastic.co/beats/filebeat:8.12.0
          args: ["-c", "/etc/filebeat.yml", "-e"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            runAsUser: 0        # Required to read /var/log/containers
            privileged: false
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: config
              mountPath: /etc/filebeat.yml
              subPath: filebeat.yml
              readOnly: true
            # Pod log files generated by the container runtime
            - name: varlogcontainers
              mountPath: /var/log/containers
              readOnly: true
            # Actual log data referenced from /var/log/containers symlinks
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            # Docker container logs (if using Docker runtime)
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            # Filebeat registry (tracks what has been shipped)
            - name: data
              mountPath: /usr/share/filebeat/data
      volumes:
        - name: config
          configMap:
            name: filebeat-config
            defaultMode: 0600
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: data
          hostPath:
            path: /var/lib/filebeat-data
            type: DirectoryOrCreate
